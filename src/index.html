<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zcom调试助手</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="titlebar">
    <div class="titlebar-drag" data-tauri-drag-region>
      <span class="titlebar-title">Zcom调试助手</span>
      <button id="btn-mcp" class="mcp-btn" title="MCP 服务控制">
        <span class="mcp-dot">●</span>
        <span class="mcp-label">MCP</span>
      </button>
      <button id="btn-multi" class="mcp-btn" title="多字符串发送">M-Str</button>
    </div>
    <div class="titlebar-controls">
      <button id="btn-pin" class="title-btn" title="窗口置顶"><i data-lucide="pin"></i></button>
      <button id="btn-minimize" class="title-btn" title="最小化"><i data-lucide="minus"></i></button>
      <button id="btn-maximize" class="title-btn" title="最大化"><i data-lucide="maximize-2"></i></button>
      <button id="btn-close" class="title-btn" title="关闭"><i data-lucide="x"></i></button>
    </div>
  </div>

  <div id="menu-bar">
    <div class="menu-left">
      <button id="btn-settings" class="menu-btn">设置</button>
      <div id="view-menu-wrap" class="view-menu">
        <button id="btn-view" class="menu-btn">视图</button>
        <div id="view-dropdown" class="view-dropdown"></div>
      </div>
      <div id="help-menu-wrap" class="view-menu">
        <button id="btn-help" class="menu-btn">帮助</button>
        <div id="help-dropdown" class="view-dropdown">
          <div class="view-item" data-help-action="mcp">MCP 服务</div>
          <div class="view-item" data-help-action="devtools">开发者工具</div>
          <div class="view-item" data-help-action="about">关于</div>
        </div>
      </div>
    </div>
    <div class="menu-right">
      <div id="com-select" class="custom-select" tabindex="0">
        <div class="cs-trigger">
          <span class="cs-text" id="com-select-text">— 选择串口 —</span>
          <i data-lucide="chevron-down" class="cs-arrow-icon"></i>
        </div>
        <div class="cs-dropdown" id="com-select-dropdown"></div>
      </div>
      <button id="btn-serial-settings" class="small-btn" title="串口详细设置"><i data-lucide="settings"></i></button>
      <div id="baud-select" class="custom-select baud-select" tabindex="0">
        <div class="cs-trigger">
          <span class="cs-text" id="baud-select-text">115200</span>
          <i data-lucide="chevron-down" class="cs-arrow-icon"></i>
        </div>
        <div class="cs-dropdown" id="baud-select-dropdown"></div>
      </div>
      <button id="btn-refresh-ports" class="small-btn" title="刷新串口"><i data-lucide="refresh-cw"></i></button>
      <button id="btn-toggle-port" class="small-btn" disabled>打开</button>
      <span id="port-status" class="port-status" title="未连接"></span>
    </div>
  </div>

  <div id="content">
    <div id="receive-area">
      <div id="receive-content"></div>
    </div>

    <div id="send-drag-handle"></div>
    <div id="send-area" class="bottom-row">
      <button id="btn-clear-receive" class="small-btn"><i data-lucide="trash-2"></i> 清空</button>
      <textarea id="send-text" class="send-textarea" placeholder="输入要发送的数据..."></textarea>
      <button id="btn-send" class="send-btn" disabled>发送</button>
    </div>

    <div id="filter-bar" data-view-group="filter">
      <span class="filter-icon"><i data-lucide="search"></i></span>
      <input type="text" id="filter-input" class="filter-input" placeholder="过滤..." spellcheck="false" />
      <button id="filter-btn-case" class="filter-btn" title="大小写敏感">Aa</button>
      <button id="filter-btn-regex" class="filter-btn" title="正则模式">.*</button>
      <button id="filter-btn-clear" class="filter-btn" title="清除过滤"><i data-lucide="x"></i></button>
    </div>

    <div id="file-ops" class="bottom-row" data-view-group="file">
      <button id="btn-file-open" class="small-btn"><i data-lucide="folder-open"></i> 打开文件</button>
      <span id="file-path" class="file-path-label">未选择文件</span>
      <button id="btn-file-send" class="small-btn" disabled><i data-lucide="upload"></i> 发送文件</button>
      <button id="btn-file-save" class="small-btn"><i data-lucide="save"></i> 保存接收</button>
    </div>
    <div id="checksum-area" class="bottom-row" data-view-group="checksum">
      <label class="chk-label">
        <input type="checkbox" id="chk-checksum" /> 加校验
      </label>
      <select id="checksum-type" class="small-select" disabled>
        <option value="crc16">CRC16-Modbus</option>
        <option value="crc32">CRC32</option>
        <option value="add8">ADD8</option>
        <option value="xor8">XOR8</option>
      </select>
      <div class="segmented" id="checksum-byte-order">
        <button class="segmented-btn active" value="msb">MSB</button>
        <button class="segmented-btn" value="lsb">LSB</button>
      </div>
      <span class="label" title="正数从开头算起（+0 = 第 1 字节前），负数从末尾算起（-1 = 最后 1 字节后）">位置:</span>
      <input type="text" id="checksum-pos" class="small-input" value="+0" disabled />
      <span class="label">校验码:</span>
      <span id="checksum-result" class="checksum-value">—</span>
    </div>
  </div>

  <div id="status-bar">
    <div class="status-group">
      <label class="chk-label"><input type="checkbox" id="chk-hex-send" /> Hex发送</label>
      <label class="chk-label"><input type="checkbox" id="chk-hex-display" /> Hex显示</label>
      <label class="chk-label"><input type="checkbox" id="chk-timestamp" checked /> 时间戳</label>
      <label class="chk-label"><input type="checkbox" id="chk-fold-repeat" /> 折叠</label>
      <select id="encoding-select" class="small-select" title="编码">
        <option value="utf-8">UTF-8</option>
        <option value="gbk">GBK</option>
      </select>
    </div>
    <div class="status-group">
      <span id="stat-tx">Tx: 0</span>
      <span id="stat-rx">Rx: 0</span>
    </div>
    <div class="status-group" id="port-info">
      <span>未连接</span>
    </div>
  </div>

  <div id="settings-overlay" class="overlay hidden">
    <div id="settings-dialog" class="dialog">
      <div class="dialog-titlebar">
        <span>系统设置</span>
        <button class="dialog-close title-btn"><i data-lucide="x"></i></button>
      </div>
      <div class="dialog-body">
        <div class="setting-row">
          <label>界面配色:</label>
          <div class="segmented" data-setting="theme">
            <button class="segmented-btn active" data-value="dark">深色</button>
            <button class="segmented-btn" data-value="light">浅色</button>
            <button class="segmented-btn" data-value="system">系统</button>
            <button class="segmented-btn" data-value="high-contrast">高对比</button>
          </div>
        </div>
        <div class="setting-row">
          <label>界面字号:</label>
          <input type="number" id="setting-font-size" value="14" min="10" max="24" class="small-input" />
        </div>
        <div class="setting-row">
          <label>接收区字体:</label>
          <select id="setting-receive-font" class="small-select">
            <option value="Consolas">Consolas</option>
            <option value="Courier New">Courier New</option>
            <option value="monospace">monospace</option>
            <option value="YaHei Consolas Hybrid">YaHei Consolas Hybrid</option>
          </select>
        </div>
        <div class="setting-row">
          <label>接收区字号:</label>
          <input type="number" id="setting-receive-size" value="14" min="8" max="48" class="small-input" />
        </div>
        <div class="setting-row">
          <label>接收区颜色:</label>
          <input type="color" id="setting-receive-color" value="#00ff00" />
        </div>
        <div class="setting-row">
          <label>背景色:</label>
          <input type="color" id="setting-bg-color" value="#1a1a2e" />
        </div>
        <div class="setting-row">
          <label>发送换行符:</label>
          <div class="segmented" data-setting="lineEnding">
            <button class="segmented-btn" data-value="none">无</button>
            <button class="segmented-btn" data-value="cr">CR</button>
            <button class="segmented-btn" data-value="lf">LF</button>
            <button class="segmented-btn active" data-value="crlf">CR+LF</button>
          </div>
        </div>
        <div class="setting-row">
          <label>接收换行策略:</label>
          <div class="segmented" data-setting="receiveNewline">
            <button class="segmented-btn active" data-value="auto">自动拆分</button>
            <button class="segmented-btn" data-value="chunks">原始分块</button>
            <button class="segmented-btn" data-value="stream">连续流</button>
          </div>
        </div>
        <div class="setting-row">
          <label>重复折叠阈值:</label>
          <input type="number" id="setting-fold-count" value="5" min="2" max="100" class="small-input" />
        </div>
        <div class="setting-row">
          <label>关闭行为:</label>
          <div class="segmented" data-setting="closeBehavior">
            <button class="segmented-btn" data-value="minimize">隐藏到托盘</button>
            <button class="segmented-btn active" data-value="ask">询问</button>
            <button class="segmented-btn" data-value="close">关闭</button>
          </div>
        </div>
        <div class="setting-row">
          <label>MCP 服务:</label>
          <label class="chk-label"><input type="checkbox" id="setting-mcp-enabled" /> 启用</label>
          <span class="label" style="margin-left:12px">端口:</span>
          <input type="number" id="setting-mcp-port" value="9876" min="1024" max="65535" class="small-input" style="width:80px" />
        </div>
      </div>
      <div class="dialog-footer">
        <button id="setting-apply" class="small-btn primary">应用</button>
        <button id="setting-close" class="small-btn">关闭</button>
      </div>
    </div>
  </div>

  <div id="serial-settings-overlay" class="overlay hidden">
    <div id="serial-settings-dialog" class="dialog" style="width:380px;">
      <div class="dialog-titlebar">
        <span>串口详细设置</span>
        <button class="dialog-close title-btn" id="btn-serial-settings-close"><i data-lucide="x"></i></button>
      </div>
      <div class="dialog-body">
        <div class="setting-row">
          <label>数据位:</label>
          <div class="segmented" id="ss-char-size">
            <button class="segmented-btn" data-value="5">5</button>
            <button class="segmented-btn" data-value="6">6</button>
            <button class="segmented-btn" data-value="7">7</button>
            <button class="segmented-btn active" data-value="8">8</button>
          </div>
        </div>
        <div class="setting-row">
          <label>停止位:</label>
          <div class="segmented" id="ss-stop-bits">
            <button class="segmented-btn active" data-value="1">1</button>
            <button class="segmented-btn" data-value="2">2</button>
          </div>
        </div>
        <div class="setting-row">
          <label>校验位:</label>
          <div class="segmented" id="ss-parity">
            <button class="segmented-btn active" data-value="none">None</button>
            <button class="segmented-btn" data-value="odd">Odd</button>
            <button class="segmented-btn" data-value="even">Even</button>
            <button class="segmented-btn" data-value="mark">Mark</button>
            <button class="segmented-btn" data-value="space">Space</button>
          </div>
        </div>
        <div class="setting-row">
          <label>流控制:</label>
          <div class="segmented" id="ss-flow-control">
            <button class="segmented-btn active" data-value="none">None</button>
            <button class="segmented-btn" data-value="hardware">Hardware</button>
            <button class="segmented-btn" data-value="software">Software</button>
          </div>
        </div>
      </div>
      <div class="dialog-footer">
        <button id="btn-ss-restore" class="small-btn">恢复默认</button>
        <div style="flex:1"></div>
        <button id="btn-ss-cancel" class="small-btn">取消</button>
        <button id="btn-ss-ok" class="small-btn primary">确定</button>
      </div>
    </div>
  </div>

  <div id="mcp-prompt-overlay" class="overlay hidden">
    <div id="mcp-prompt-dialog" class="dialog" style="width:560px;">
      <div class="dialog-titlebar">
        <span>MCP 服务 — AI Agent 配置指南</span>
        <button class="dialog-close title-btn" id="btn-mcp-prompt-close"><i data-lucide="x"></i></button>
      </div>
      <div class="dialog-body" style="padding:12px;">
        <textarea id="mcp-prompt-text" readonly style="width:100%;height:340px;resize:none;font-family:var(--receive-font);font-size:12px;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:4px;padding:10px;white-space:pre;tab-size:2"></textarea>
      </div>
      <div class="dialog-footer">
        <button id="btn-mcp-prompt-copy" class="small-btn primary">复制到剪贴板</button>
        <div style="flex:1"></div>
        <button id="btn-mcp-prompt-close2" class="small-btn">关闭</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/titlebar.js"></script>
  <script type="module" src="js/menu.js"></script>
  <script type="module" src="js/receive.js"></script>
  <script type="module" src="js/bottom.js"></script>
  <script type="module" src="js/statusbar.js"></script>
  <script type="module" src="js/view.js"></script>
  <script type="module" src="js/settings.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
