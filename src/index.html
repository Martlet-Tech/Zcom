<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COM调试助手</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="titlebar">
    <div class="titlebar-drag" data-tauri-drag-region>
      <span class="titlebar-title">COM调试助手</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-pin" class="title-btn" title="窗口置顶">📌</button>
      <button id="btn-multi" class="title-btn" title="多字符串发送">📋</button>
      <button id="btn-minimize" class="title-btn" title="最小化">─</button>
      <button id="btn-maximize" class="title-btn" title="最大化">□</button>
      <button id="btn-close" class="title-btn" title="关闭">✕</button>
    </div>
  </div>

  <div id="menu-bar">
    <div class="menu-left">
      <button id="btn-settings" class="menu-btn">设置</button>
      <button id="btn-about" class="menu-btn">关于</button>
    </div>
    <div class="menu-right">
      <div id="com-select" class="custom-select" tabindex="0">
        <div class="cs-trigger">
          <span class="cs-text" id="com-select-text">— 选择串口 —</span>
          <span class="cs-arrow">▾</span>
        </div>
        <div class="cs-dropdown" id="com-select-dropdown"></div>
      </div>
      <select id="baud-select" class="baud-select">
        <option value="300">300</option>
        <option value="1200">1200</option>
        <option value="2400">2400</option>
        <option value="4800">4800</option>
        <option value="9600">9600</option>
        <option value="14400">14400</option>
        <option value="19200">19200</option>
        <option value="28800">28800</option>
        <option value="38400">38400</option>
        <option value="56000">56000</option>
        <option value="57600">57600</option>
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="460800">460800</option>
        <option value="921600">921600</option>
      </select>
      <button id="btn-refresh-ports" class="small-btn" title="刷新串口">↻</button>
      <button id="btn-toggle-port" class="small-btn" disabled>打开</button>
      <span id="port-status" class="port-status" title="未连接"></span>
    </div>
  </div>

  <div id="content">
    <div id="receive-area">
      <div id="receive-content"></div>
    </div>

    <div id="filter-bar">
      <span class="filter-icon">🔍</span>
      <input type="text" id="filter-input" class="filter-input" placeholder="过滤..." spellcheck="false" />
      <button id="filter-btn-case" class="filter-btn" title="大小写敏感">Aa</button>
      <button id="filter-btn-regex" class="filter-btn" title="正则模式">.*</button>
      <button id="filter-btn-clear" class="filter-btn" title="清除过滤">✕</button>
      <span id="filter-count" class="filter-count"></span>
    </div>
    <div id="bottom-panel">
      <div id="file-ops" class="bottom-row">
        <button id="btn-file-open" class="small-btn">📂 打开文件</button>
        <span id="file-path" class="file-path-label">未选择文件</span>
        <button id="btn-file-send" class="small-btn" disabled>📤 发送文件</button>
        <button id="btn-file-save" class="small-btn">💾 保存接收</button>
        <button id="btn-clear-receive" class="small-btn">🗑 清空</button>
      </div>
      <div id="checksum-area" class="bottom-row">
        <label class="chk-label">
          <input type="checkbox" id="chk-checksum" /> 加校验
        </label>
        <select id="checksum-type" class="small-select" disabled>
          <option value="crc16">CRC16-Modbus</option>
          <option value="crc32">CRC32</option>
          <option value="add8">ADD8</option>
          <option value="xor8">XOR8</option>
        </select>
        <span class="label">位置:</span>
        <input type="text" id="checksum-pos" class="small-input" value="+0" disabled />
        <span class="label">校验码:</span>
        <span id="checksum-result" class="checksum-value">—</span>
      </div>
      <div id="send-area" class="bottom-row">
        <textarea id="send-text" class="send-textarea" rows="4" placeholder="输入要发送的数据..."></textarea>
        <div class="send-right">
          <button id="btn-send" class="send-btn" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>

  <div id="status-bar">
    <div class="status-group">
      <label class="chk-label"><input type="checkbox" id="chk-hex-send" /> Hex发送</label>
      <label class="chk-label"><input type="checkbox" id="chk-hex-display" /> Hex显示</label>
      <label class="chk-label"><input type="checkbox" id="chk-timestamp" checked /> 时间戳</label>
      <select id="encoding-select" class="small-select" title="编码">
        <option value="utf-8">UTF-8</option>
        <option value="gbk">GBK</option>
      </select>
    </div>
    <div class="status-group">
      <span id="stat-tx">Tx: 0</span>
      <span id="stat-rx">Rx: 0</span>
    </div>
    <div class="status-group" id="port-info">
      <span>未连接</span>
    </div>
    <button id="btn-toggle-panel" class="status-toggle" title="折叠底部面板">▼</button>
  </div>

  <div id="settings-overlay" class="overlay hidden">
    <div id="settings-dialog" class="dialog">
      <div class="dialog-titlebar">
        <span>系统设置</span>
        <button class="dialog-close title-btn">✕</button>
      </div>
      <div class="dialog-body">
        <div class="setting-row">
          <label>界面配色:</label>
          <div class="theme-radios">
            <label><input type="radio" name="theme" value="dark" checked /> 深色</label>
            <label><input type="radio" name="theme" value="light" /> 浅色</label>
            <label><input type="radio" name="theme" value="system" /> 系统</label>
            <label><input type="radio" name="theme" value="high-contrast" /> 高对比</label>
          </div>
        </div>
        <div class="setting-row">
          <label>界面字号:</label>
          <input type="number" id="setting-font-size" value="14" min="10" max="24" class="small-input" />
        </div>
        <div class="setting-row">
          <label>接收区字体:</label>
          <select id="setting-receive-font" class="small-select">
            <option value="Consolas">Consolas</option>
            <option value="Courier New">Courier New</option>
            <option value="monospace">monospace</option>
            <option value="YaHei Consolas Hybrid">YaHei Consolas Hybrid</option>
          </select>
        </div>
        <div class="setting-row">
          <label>接收区字号:</label>
          <input type="number" id="setting-receive-size" value="14" min="8" max="48" class="small-input" />
        </div>
        <div class="setting-row">
          <label>接收区颜色:</label>
          <input type="color" id="setting-receive-color" value="#00ff00" />
        </div>
        <div class="setting-row">
          <label>背景色:</label>
          <input type="color" id="setting-bg-color" value="#1a1a2e" />
        </div>
      </div>
      <div class="dialog-footer">
        <button id="setting-apply" class="small-btn primary">应用</button>
        <button id="setting-close" class="small-btn">关闭</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/utils.js"></script>
  <script type="module" src="js/titlebar.js"></script>
  <script type="module" src="js/menu.js"></script>
  <script type="module" src="js/receive.js"></script>
  <script type="module" src="js/bottom.js"></script>
  <script type="module" src="js/statusbar.js"></script>
  <script type="module" src="js/settings.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
